{% extends "base.html" %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-purple-900 flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">
    <div class="text-center mb-6">
      <div class="mx-auto w-12 h-12 rounded-full bg-purple-700 text-white flex items-center justify-center font-bold text-xl">K</div>
      <h1 class="text-2xl font-bold text-slate-900 mt-4">Create Account</h1>
      <p class="text-slate-600 text-sm mt-1">Join KEWOTA to book sessions</p>
    </div>

    {% if messages %}
      {% for message in messages %}
        <div class="mb-4 p-3 rounded-lg bg-red-50 text-red-700 border border-red-200">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="POST" class="space-y-3">
      {% csrf_token %}
      <div>
        <label class="block text-sm font-semibold text-slate-800 mb-1">First Name</label>
        <input type="text" name="first_name" required class="w-full border border-slate-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-purple-700" placeholder="John">
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-800 mb-1">Last Name</label>
        <input type="text" name="last_name" required class="w-full border border-slate-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-purple-700" placeholder="Doe">
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-800 mb-1">Email Address</label>
        <input type="email" name="email" required class="w-full border border-slate-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-purple-700" placeholder="your@email.com">
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-800 mb-1">Phone Number</label>
        <input type="tel" name="phone_number" class="w-full border border-slate-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-purple-700" placeholder="+254 7XX XXX XXX">
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-800 mb-1">Password</label>
        <input type="password" name="password" required class="w-full border border-slate-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-purple-700" placeholder="Min. 8 characters">
        <p class="text-xs text-slate-500 mt-1">Must be at least 8 characters long</p>
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-800 mb-1">Confirm Password</label>
        <input type="password" name="password_confirm" required class="w-full border border-slate-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-purple-700" placeholder="Confirm password">
      </div>
      <button type="submit" class="w-full bg-purple-700 hover:bg-purple-800 text-white font-semibold py-3 rounded-lg mt-4">
        Create Account
      </button>
    </form>

    <div class="mt-6 text-center space-y-3">
      <p class="text-sm text-slate-600">Already have an account? <a href="{% url 'patient_login' %}" class="text-purple-700 font-semibold hover:underline">Sign In</a></p>
      <a href="{% url 'home' %}" class="block text-sm text-slate-600 hover:underline">Back to home</a>
    </div>
  </div>
</div>
{% endblock %}
