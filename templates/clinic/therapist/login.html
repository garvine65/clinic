{% extends "base.html" %}

{% block content %}

<div class="min-h-screen bg-gradient-to-br from-blue-50 to-slate-100 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md mx-auto bg-white rounded-lg shadow-lg p-8">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-blue-900 rounded-full flex items-center justify-center mx-auto mb-4">
                <span class="text-white font-bold text-2xl">N</span>
            </div>
            <h1 class="text-3xl font-bold text-blue-900">NAPH Clinic</h1>
            <p class="text-slate-600 mt-2">Therapist Portal</p>
        </div>

        <!-- Error/Success Messages -->
        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 p-4 rounded-lg {% if message.tags %}bg-red-100 text-red-700{% else %}bg-green-100 text-green-700{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <!-- Login Form -->
        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <!-- Username -->
            <div>
                <label for="username" class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                <input type="text" id="username" name="username" required
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-900 focus:border-transparent"
                    placeholder="Enter your username">
            </div>

            <!-- Password -->
            <div>
                <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                <input type="password" id="password" name="password" required
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-900 focus:border-transparent"
                    placeholder="Enter your password">
            </div>

            <!-- Submit -->
            <button type="submit" class="w-full bg-blue-900 text-white py-2 px-4 rounded-lg hover:bg-blue-800 font-semibold transition">
                Sign In
            </button>
        </form>

        <!-- Footer -->
        <div class="mt-6 pt-6 border-t border-slate-300 text-center">
            <p class="text-sm text-slate-600">
                Patient? <a href="{% url 'patient_login' %}" class="text-blue-900 hover:underline font-semibold">Login here</a>
            </p>
        </div>
    </div>
</div>

{% endblock %}
