{% extends "base.html" %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-purple-900 flex items-center justify-center px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">
    <div class="text-center mb-6">
      <div class="mx-auto w-12 h-12 rounded-full bg-purple-700 text-white flex items-center justify-center font-bold text-xl">K</div>
      <h1 class="text-2xl font-bold text-slate-900 mt-4">Reception Login</h1>
      <p class="text-slate-600 text-sm mt-1">Customer care / front desk access</p>
    </div>

    {% if messages %}
      {% for message in messages %}
        <div class="mb-4 p-3 rounded-lg bg-red-50 text-red-700 border border-red-200">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="post" class="space-y-4">
      {% csrf_token %}
      <div>
        <label class="block text-sm font-semibold text-slate-800 mb-2">Username</label>
        <input type="text" name="username" required class="w-full border border-slate-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-purple-700">
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-800 mb-2">Password</label>
        <input type="password" name="password" required class="w-full border border-slate-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-purple-700">
      </div>
      <button type="submit" class="w-full bg-purple-700 hover:bg-purple-800 text-white font-semibold py-3 rounded-lg">
        Sign in
      </button>
    </form>

    <div class="mt-6 text-center">
      <a href="{% url 'home' %}" class="text-sm text-slate-600 hover:underline">Back to home</a>
    </div>
  </div>
</div>
{% endblock %}
